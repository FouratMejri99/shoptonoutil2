services:
  - type: web
    name: solupedia-backend
    env: node
    buildCommand: npm install && npm run build:server
    startCommand: npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solupedia-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: VITE_OAUTH_PORTAL_URL
        value: https://your-oauth-server.com
      - key: OAUTH_SERVER_URL
        value: https://your-oauth-server.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ACCESS_TOKEN
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: public-assets
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: solupedia-db
    plan: free
    databaseName: solupedia
    user: solupedia
