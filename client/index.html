    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <link rel="icon" type="image/png" href="/ShortLogo.png" />
    <link rel="apple-touch-icon" href="/ShortLogo.png" />
    <title> Solupedia</title>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics - only load if properly configured -->
    <template id="analytics-script">
      <script
        defer
        src="%VITE_ANALYTICS_ENDPOINT%/umami"
        data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
      ></script>
    </template>
    <script>
      (function () {
        const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        const websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (endpoint && websiteId && endpoint !== "local-dev") {
          const template = document.getElementById("analytics-script");
          const script = template.content.cloneNode(true);
          document.body.appendChild(script);
        }
      })();
    </script>
  </body>
</html>
